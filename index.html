<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="/images/suprexon_logo.png" />
  <meta name="description" content="Suprexon Technologies - Web, App & Software Solutions" />

  <!-- Open Graph -->
  <meta property="og:title" content="Suprexon Technologies" />
  <meta property="og:description" content="Modern Web & Software Development Company" />
  <meta property="og:image" content="/images/suprexon_logo.png" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/images/suprexon_logo.png" />

  <title>SupreXon</title>

  <!-- 🔥 Background Video CSS -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      overflow-x: hidden;
    }

    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    #video-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }
  </style>
</head>

<body>
  <!-- 🎥 Background Video -->
  <video
    id="bg-video"
    autoplay
    loop
    muted
    playsinline
    preload="metadata"
  >
    <source src="/videos/vdo2.mp4" type="video/mp4" />
  </video>

  <!-- Dark Overlay -->
  <div id="video-overlay"></div>

  <!-- React App -->
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
